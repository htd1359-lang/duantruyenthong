<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CĂN TIN - Trạm Dừng Chia Sẻ</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* GIAI ĐOẠN 1: TRANG CHÀO */
        .welcome-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url('./hinhanh/bgr.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
            position: relative;
        }

        .cloud-btn-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
            padding: 20px; 
        }

        .cloud-btn-container:hover { transform: scale(1.05); }

        .cloud-base {
            width: 150px;
            height: 60px;
            background: white;
            border-radius: 50px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .cloud-base::before, .cloud-base::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud-base::before { width: 70px; height: 70px; top: -35px; left: 20px; }
        .cloud-base::after { width: 90px; height: 90px; top: -50px; right: 15px; }

        .btn-enter-text {
            font-size: 22px;
            font-weight: bold;
            color: rgb(78, 209, 144);
            text-decoration: none;
            position: relative;
            z-index: 10;
            letter-spacing: 1px;
        }

        .arrow { 
            font-size: 40px; 
            margin-top: 30px; 
            animation: bounce 2s infinite; 
            color: white;
            position: relative;
            z-index: 5;
        }
        
        /* GIAI ĐOẠN 2: NỘI DUNG CHÍNH */
        .content-screen {
            min-height: 100vh;
            padding: 40px 20px;
            background: #f4f4f9;
            display: flex;
            justify-content: center;
        }
        .card {
            background: linear-gradient(135deg, #95edd5 0%, #e0e7ff 100%);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* KHUNG VIDEO TỐI ƯU */
        .video-local-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            background: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        video { width: 100%; display: block; outline: none; }
        
        .selection-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .btn-select {
            flex: 1;
            padding: 12px;
            border: 2px solid #0f828a;
            background: white;
            color: #0f828a;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 15px;
        }
        .btn-select.active { background: #0f828a; color: white; }

        .image-placeholder {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease-in-out;
        }

        .section { margin-bottom: 30px; }
        label { font-weight: bold; color: #444; display: block; margin-bottom: 12px; font-size: 16px; }

        .rating { display: flex; flex-direction: row-reverse; justify-content: center; margin-bottom: 15px; }
        .rating input { display: none; }
        .rating label { cursor: pointer; width: 40px; font-size: 35px; color: #e6e6e6; transition: 0.3s; }
        .rating label:before { content: '★'; }
        .rating input:checked ~ label { color: #ffca08; }
        .rating label:hover, .rating label:hover ~ label { color: #ffca08; }

        textarea {
            width: 100%; height: 100px; padding: 12px; border-radius: 8px; border: 1px solid #ddd;
            font-family: inherit; resize: none; box-sizing: border-box; outline: none; font-size: 14px;
        }

        .btn-submit {
            width: 100%; background: #0f828a; color: white; border: none; padding: 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px;
            transition: 0.3s; font-size: 16px;
        }
        .btn-submit:hover { background: #0b6369; transform: translateY(-2px); }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
            60% {transform: translateY(-7px);}
        }
    </style>
</head>
<body>

    <div class="welcome-screen">
        <div class="cloud-btn-container" onclick="document.getElementById('main-content').scrollIntoView();">
            <div class="cloud-base">
                <span class="btn-enter-text">VÀO ĐÂY</span>
            </div>
        </div>
        <div class="arrow">↓</div>
    </div>

    <div id="main-content" class="content-screen">
        <div class="card">
            <h2 style="text-align: center; margin-top: 0; color: #000; font-weight: bold; font-size: 24px; margin-bottom: 20px;">CĂN TIN NÓI NHỎ</h2>
            
            <div class="video-local-container">
                <video controls poster="./hinhanh/6b4d0fbf-d975-4e2e-9012-eca2f8d3c07e.jpg">
                    <source src="./video/Căn Tin Nói Nhỏ.mov" type="video/mp4">
                    Trình duyệt của bạn không hỗ trợ xem video.
                </video>
            </div>

            <div class="section">
                <label style="text-align: center; font-size: 18px;">🍱 Thực đơn hôm nay</label>
                <div class="selection-group">
                    <button class="btn-select active" onclick="changeImage('mon-an', this)">Đồ Ăn</button>
                    <button class="btn-select" onclick="changeImage('nuoc-uong', this)">Thức Uống</button>
                </div>
                <img id="main-image" src="./hinhanh/doan.png" alt="Thực đơn" class="image-placeholder">
            </div>

            <div class="section" style="background: rgba(255,255,255,0.5); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.7);">
                <form action="https://formspree.io/f/mlgpoqzw" method="POST">
                    <label style="text-align: center; font-size: 20px; margin-bottom: 5px; color: #0f828a;">✍️ Giúp Tôi Nhé</label>
                    <p style="text-align: center; margin: 0 0 15px 0; font-size: 14px; color: #555;">Đánh giá của bạn giúp căn tin tốt hơn!</p>
                    <div class="rating">
                        <input type="radio" name="Danh_Gia_Sao" value="5" id="star5" required><label for="star5"></label>
                        <input type="radio" name="Danh_Gia_Sao" value="4" id="star4"><label for="star4"></label>
                        <input type="radio" name="Danh_Gia_Sao" value="3" id="star3"><label for="star3"></label>
                        <input type="radio" name="Danh_Gia_Sao" value="2" id="star2"><label for="star2"></label>
                        <input type="radio" name="Danh_Gia_Sao" value="1" id="star1"><label for="star1"></label>
                    </div>
                    <textarea name="Y_Kien_Dong_Gop" placeholder="Nhập nhận xét của bạn..." required></textarea>
                    <button type="submit" class="btn-submit">GỬI PHẢN HỒI NGAY</button>
                </form>
            </div>
            
            <p style="text-align: center; font-size: 12px; color: #666; margin-top: 25px;">&copy; Sinh viên Trường ĐH Khoa học Huế<br>Dự án: Trạm Dừng Chia Sẻ</p>
        </div> 
    </div> 

    <script>
        function changeImage(type, element) {
            const img = document.getElementById('main-image');
            img.style.opacity = 0;
            setTimeout(() => {
                if (type === 'mon-an') {
                    img.src = 'hinhanh/doan.png';
                } else if (type === 'nuoc-uong') {
                    img.src = 'hinhanh/6b4d0fbf-d975-4e2e-9012-eca2f8d3c07e.jpg'; 
                }
                img.style.opacity = 1;
            }, 300);
            const buttons = document.querySelectorAll('.btn-select');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
