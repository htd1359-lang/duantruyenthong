<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Căn tin góp ý</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* GIAI ĐOẠN 1: TRANG CHÀO */
        .welcome-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url('');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            text-align: center;
        }
        .btn-enter {
            font-size: 24px;
            font-weight: bold;
            color: rgb(10, 125, 182);
            text-decoration: none;
            border: 3px solid white;
            padding: 15px 40px;
            border-radius: 50px;
            transition: 0.3s;
            cursor: pointer;
            background: white;
        }
        .btn-enter:hover { color: #ffffff; background: transparent; }
        .arrow { font-size: 40px; margin-top: 20px; animation: bounce 2s infinite; }
        
        /* GIAI ĐOẠN 2: NỘI DUNG CHÍNH */
        .content-screen {
            min-height: 100vh;
            padding: 40px 20px;
            background: #f4f4f9;
            display: flex;
            justify-content: center;
        }
        .card {
            background: linear-gradient(135deg, #95edd5 0%, #e0e7ff 100%);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .image-placeholder {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            object-fit: cover;
            display: block;
        }

        .tiktok-container {
            width: 100%;
            height: 580px;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        iframe { width: 100%; height: 100%; border: none; }
        
        .section { margin-bottom: 30px; }
        label { font-weight: bold; color: #444; display: block; margin-bottom: 8px; }

        /* HỆ THỐNG ĐÁNH GIÁ 5 SAO */
        .rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            margin-bottom: 15px;
        }
        .rating input { display: none; }
        .rating label {
            cursor: pointer;
            width: 40px;
            font-size: 35px;
            color: #ffffff; /* Màu sao mặc định */
            text-shadow: 0 0 2px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .rating label:before { content: '★'; }
        .rating input:checked ~ label { color: #ffca08; }
        .rating label:hover, .rating label:hover ~ label { color: #ffca08; }

        /* Ô NHẬN XÉT */
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: inherit;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            background: #0f828a;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-submit:hover { background: #0aa1ac; transform: translateY(-2px); }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
            60% {transform: translateY(-7px);}
        }
    </style>
</head>
<body>

    <div class="welcome-screen">
        <button class="btn-enter" onclick="document.getElementById('main-content').scrollIntoView();">VÀO ĐÂY</button>
        <div class="arrow">↓</div>
    </div>

    <div id="main-content" class="content-screen">
        <div class="card">
            <h2 style="text-align: center; margin-top: 0; color: #000000; font-weight: bold;">TÊN CÁC VẬT THỂ</h2>
            
            <div class="tiktok-container">
                <iframe 
                    src="https://www.tiktok.com/embed/7402636605021261063" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="section">
                <label style="text-align: center; margin-top: 15px;">🖼️ Hình ảnh minh họa</label>
                <img src="./image/6b4d0fbf-d975-4e2e-9012-eca2f8d3c07e.jpg" alt="Ảnh minh họa" class="image-placeholder">
            </div>

            <div class="section" style="background: rgba(255,255,255,0.4); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.6);">
                <form action="https://formspree.io/f/mlgpoqzw" method="POST">
                    <label style="text-align: center; font-size: 18px; margin-bottom: 5px;">✍️ Giúp Tôi Nhé</label>
                    <p style="text-align: center; margin: 0 0 15px 0; font-size: 13px; color: #555;">Đánh giá của bạn giúp căn tin tốt hơn!</p>
                    
                    <div class="rating">
                        <input type="radio" name="Danh_Gia_Sao" value="5" id="star5" required><label for="star5"></label>
                        <input type="radio" name="Danh_Gia_Sao" value="4" id="star4"><label for="star4"></label>
                        <input type="radio" name="Danh_Gia_Sao" value="3" id="star3"><label for="star3"></label>
                        <input type="radio" name="Danh_Gia_Sao" value="2" id="star2"><label for="star2"></label>
                        <input type="radio" name="Danh_Gia_Sao" value="1" id="star1"><label for="star1"></label>
                    </div>

                    <textarea name="Y_Kien_Dong_Gop" placeholder="Nhập nhận xét hoặc món bạn muốn căn tin bổ sung..." required></textarea>
                    
                    <button type="submit" class="btn-submit">GỬI PHẢN HỒI NGAY</button>
                </form>
            </div>
            
            <p style="text-align: center; font-size: 12px; color: #666; margin-top: 20px;">&copy; Sinh viên Trường Đại học Khoa học Huế</p>
        </div> 
    </div> 
</body>
</html>
